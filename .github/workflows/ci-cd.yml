name: Microservices CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  test:
    name: Test ${{ matrix.service_dir }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service_dir:
          - api-gateway
          - auth-service
          - eureka-server
          - notification_service
          - reward-service
          - user-service
          - wallet-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run Maven verify
        working-directory: ${{ matrix.service_dir }}
        run: mvn -B clean verify

  docker:
    name: Publish ${{ matrix.image_name }}
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service_dir: api-gateway
            image_name: api-gateway
          - service_dir: auth-service
            image_name: auth-service
          - service_dir: eureka-server
            image_name: eureka-server
          - service_dir: notification_service
            image_name: notification-service
          - service_dir: reward-service
            image_name: reward-service
          - service_dir: user-service
            image_name: user-service
          - service_dir: wallet-service
            image_name: wallet-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute lowercase owner
        id: owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/${{ matrix.image_name }}
          tags: |
            type=sha,format=long
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service_dir }}
          file: ${{ matrix.service_dir }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name != 'pull_request' && secrets.SSH_HOST != '' && secrets.SSH_USERNAME != '' && secrets.SSH_PRIVATE_KEY != '' && secrets.DEPLOY_PATH != '' && secrets.PROD_ENV_FILE != '' && secrets.REGISTRY_USERNAME != '' && secrets.REGISTRY_PASSWORD != ''
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute lowercase owner
        id: owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Copy deployment compose file
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          source: deploy/docker-compose.prod.yml
          target: ${{ secrets.DEPLOY_PATH }}
          strip_components: 1

      - name: Deploy updated stack
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
          REGISTRY: ${{ env.REGISTRY }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          IMAGE_NAMESPACE: ${{ steps.owner.outputs.value }}
          IMAGE_TAG: sha-${{ github.sha }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          envs: DEPLOY_PATH,PROD_ENV_FILE,REGISTRY,REGISTRY_USERNAME,REGISTRY_PASSWORD,IMAGE_NAMESPACE,IMAGE_TAG
          script_stop: true
          script: |
            mkdir -p "$DEPLOY_PATH"
            cat > "$DEPLOY_PATH/.env" <<'EOF'
            $PROD_ENV_FILE
            EOF
            cd "$DEPLOY_PATH"
            echo "$REGISTRY_PASSWORD" | docker login "$REGISTRY" -u "$REGISTRY_USERNAME" --password-stdin
            export IMAGE_REGISTRY="$REGISTRY"
            export IMAGE_NAMESPACE="$IMAGE_NAMESPACE"
            export IMAGE_TAG="$IMAGE_TAG"
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
