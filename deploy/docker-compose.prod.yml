services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"

  zipkin:
    image: openzipkin/zipkin:latest
    restart: unless-stopped
    ports:
      - "9411:9411"

  auth-db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${AUTH_POSTGRES_DB}
      POSTGRES_USER: ${AUTH_POSTGRES_USER}
      POSTGRES_PASSWORD: ${AUTH_POSTGRES_PASSWORD}
    volumes:
      - auth_db_data:/var/lib/postgresql/data

  user-db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${USER_POSTGRES_DB}
      POSTGRES_USER: ${USER_POSTGRES_USER}
      POSTGRES_PASSWORD: ${USER_POSTGRES_PASSWORD}
    volumes:
      - user_db_data:/var/lib/postgresql/data

  wallet-db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${WALLET_POSTGRES_DB}
      POSTGRES_USER: ${WALLET_POSTGRES_USER}
      POSTGRES_PASSWORD: ${WALLET_POSTGRES_PASSWORD}
    volumes:
      - wallet_db_data:/var/lib/postgresql/data

  reward-db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${REWARD_POSTGRES_DB}
      POSTGRES_USER: ${REWARD_POSTGRES_USER}
      POSTGRES_PASSWORD: ${REWARD_POSTGRES_PASSWORD}
    volumes:
      - reward_db_data:/var/lib/postgresql/data

  eureka-server:
    image: ${IMAGE_REGISTRY}/${IMAGE_NAMESPACE}/eureka-server:${IMAGE_TAG}
    restart: unless-stopped
    ports:
      - "8761:8761"
    depends_on:
      - zipkin
    env_file:
      - .env

  auth-service:
    image: ${IMAGE_REGISTRY}/${IMAGE_NAMESPACE}/auth-service:${IMAGE_TAG}
    restart: unless-stopped
    depends_on:
      - auth-db
      - redis
      - kafka
      - eureka-server
    env_file:
      - .env

  user-service:
    image: ${IMAGE_REGISTRY}/${IMAGE_NAMESPACE}/user-service:${IMAGE_TAG}
    restart: unless-stopped
    depends_on:
      - user-db
      - redis
      - kafka
      - eureka-server
    env_file:
      - .env

  wallet-service:
    image: ${IMAGE_REGISTRY}/${IMAGE_NAMESPACE}/wallet-service:${IMAGE_TAG}
    restart: unless-stopped
    depends_on:
      - wallet-db
      - redis
      - kafka
      - eureka-server
    env_file:
      - .env

  reward-service:
    image: ${IMAGE_REGISTRY}/${IMAGE_NAMESPACE}/reward-service:${IMAGE_TAG}
    restart: unless-stopped
    depends_on:
      - reward-db
      - redis
      - kafka
      - eureka-server
    env_file:
      - .env

  notification-service:
    image: ${IMAGE_REGISTRY}/${IMAGE_NAMESPACE}/notification-service:${IMAGE_TAG}
    restart: unless-stopped
    depends_on:
      - kafka
      - eureka-server
    env_file:
      - .env

  api-gateway:
    image: ${IMAGE_REGISTRY}/${IMAGE_NAMESPACE}/api-gateway:${IMAGE_TAG}
    restart: unless-stopped
    depends_on:
      - auth-service
      - user-service
      - wallet-service
      - reward-service
      - eureka-server
    env_file:
      - .env
    ports:
      - "8080:8080"

volumes:
  auth_db_data:
  user_db_data:
  wallet_db_data:
  reward_db_data:
